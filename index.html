<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mac Studio PWA</title>

  <link rel="manifest" href="manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/518/518713.png">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #1e1e1e; color: #f5f5f7; display: flex; flex-direction: column; height: 100vh;
      padding-top: env(safe-area-inset-top, 0px); 
    }
    .mac-toolbar { background-color: #2d2d2d; height: 52px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #3a3a3c; }
    .mac-dots { display: flex; gap: 8px; margin-right: 20px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .close { background-color: #ff5f56; }
    .minimize { background-color: #ffbd2e; }
    .maximize { background-color: #27c93f; }
    .back-btn { background: #3a3a3c; color: #f5f5f7; border: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
    .back-btn:hover { background: #48484a; }
    .app-title { flex-grow: 1; text-align: center; font-size: 14px; font-weight: 600; color: #aeaeae; margin-right: 80px; }
    .content { padding: 40px 24px; text-align: center; flex-grow: 1; }
    h1 { font-size: 28px; font-weight: 500; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { color: #86868b; font-size: 16px; line-height: 1.5; max-width: 450px; margin: 0 auto; }
  </style>
</head>
<body>

  <header class="mac-toolbar">
    <div class="mac-dots">
      <span class="dot close"></span>
      <span class="dot minimize"></span>
      <span class="dot maximize"></span>
    </div>
    <button class="back-btn" onclick="alert('Navigating Back!')">← Back</button>
    <div class="app-title">Mac Studio App Environment</div>
  </header>

  <main class="content">
    <h1>Welcome to your PWA</h1>
    <p>If everything is deployed correctly, you should now see the installation prompt in your browser bar!</p>
  </main>

  <script>
    // Registers a real external service worker file
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log("PWA System: Active"))
        .catch(err => console.log("PWA Error: ", err));
    }
  </script>
</body>
</html>
