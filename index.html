<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mac Studio PWA</title>

  <link rel="manifest" href="data:application/manifest+json,HtmlUrlEncoded,{%22name%22:%22Mac%20Studio%22,%22short_name%22:%22MacStudio%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%231e1e1e%22,%22theme_color%22:%22%232d2d2d%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/518/518713.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/518/518713.png">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #1e1e1e;
      color: #f5f5f7;
      display: flex;
      flex-direction: column;
      height: 100vh;
      /* Ensures content doesn't hide behind mobile camera notches or status bars */
      padding-top: env(safe-area-inset-top, 0px); 
    }

    /* Mac Window Header Toolbar */
    .mac-toolbar {
      background-color: #2d2d2d;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #3a3a3c;
    }

    /* Mac Window Control Dots */
    .mac-dots {
      display: flex;
      gap: 8px;
      margin-right: 20px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .close { background-color: #ff5f56; }
    .minimize { background-color: #ffbd2e; }
    .maximize { background-color: #27c93f; }

    /* Custom In-App Navigation Back Button */
    .back-btn {
      background: #3a3a3c;
      color: #f5f5f7;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    .back-btn:hover {
      background: #48484a;
    }

    .app-title {
      flex-grow: 1;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #aeaeae;
      margin-right: 80px; /* Centers text relative to the window controls */
    }

    /* Main Workspace Content */
    .content {
      padding: 40px 24px;
      text-align: center;
      flex-grow: 1;
    }
    h1 {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    p {
      color: #86868b;
      font-size: 16px;
      line-height: 1.5;
      max-width: 450px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <header class="mac-toolbar">
    <div class="mac-dots">
      <span class="dot close"></span>
      <span class="dot minimize"></span>
      <span class="dot maximize"></span>
    </div>
    <button class="back-btn" onclick="alert('Navigating Back!')">← Back</button>
    <div class="app-title">Mac Studio App Environment</div>
  </header>

  <main class="content">
    <h1>Welcome to your PWA</h1>
    <p>If you see a traditional browser URL address bar above this window, this is currently running as a normal website shortcut.</p>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      // Inline generation of the background helper script to keep this test completely self-contained
      const workerCode = `self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request)); });`;
      const blob = new Blob([workerCode], { type: 'application/javascript' });
      const workerUrl = URL.createObjectURL(blob);
      
      navigator.serviceWorker.register(workerUrl)
        .then(() => console.log("PWA Background System: Online"))
        .catch(err => console.log("PWA Background System Error: ", err));
    }
  </script>
</body>
</html>
